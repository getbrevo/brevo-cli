name: Prerelease

on:
  push:
    branches:
      - "release-*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prerelease:
    name: Changesets Prerelease
    runs-on: ubuntu-latest

    # Gates the prerelease publish behind required reviewers, scoped to
    # `release-*` branches only. Configure in Settings → Environments:
    #   - Required reviewers: <release team>
    #   - Deployment branches: pattern `release-*`
    #     npm Trusted Publishing. Configure the trusted publisher on
    #     npmjs.com for @getbrevo/cli: repo getbrevo/brevo-cli,
    #     workflow .github/workflows/pre-release.yaml, environment
    #     npm-prerelease.)
    environment: npm-prerelease

    permissions:
      contents: write
      pull-requests: write
      # Required for npm provenance.
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          registry-url: "https://registry.npmjs.org/"
          scope: "@getbrevo"
          cache: yarn

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1, which in
      # turn requires Node ^20.17.0 || >=22.9.0. Node 20.19.0 ships with
      # npm 10.x, so upgrade explicitly. Pin the version — do not use @latest.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Check for pre.json file existence
        id: check_files
        # andstor/file-existence-action@v2.0.0
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029
        with:
          files: ".changeset/pre.json"

      - name: Enter prerelease mode (alpha by default)
        if: steps.check_files.outputs.files_exists == 'false' && !contains(github.event.head_commit.message, 'Exit prerelease')
        run: yarn changeset pre enter alpha

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Create prerelease PR
        # changesets/action@v1.7.0
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b
        with:
          title: "chore(release): version packages (alpha)"
          version: yarn version:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        id: changesets
        if: steps.check_files.outputs.files_exists == 'true' && contains(github.event.head_commit.message, 'Version Packages')
        # changesets/action@v1.7.0
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b
        with:
          version: echo "This step should never version"
          publish: yarn publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth is via npm Trusted Publishing (OIDC).
          # The trust relationship must be configured on npmjs.com for
          # @getbrevo/cli: repo getbrevo/brevo-cli, workflow
          # .github/workflows/pre-release.yaml, environment npm-prerelease.
          # https://docs.npmjs.com/trusted-publishers
          NPM_CONFIG_PROVENANCE: "true"

      - name: Send Slack Notification
        if: steps.changesets.outcome == 'success' && steps.changesets.outputs.published == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_PACKAGE_RELEASE_WEBHOOK_URL }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification."
            exit 0
          fi

          name=$(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[0].name')
          version=$(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[0].version')

          # Resolve the merged "Version Packages" PR for this commit so the
          # Slack message links to the actual changeset diff. `// empty`
          # makes jq emit nothing (instead of the literal "null") when the
          # commit has no associated PR — otherwise `[ -n "$pr_number" ]`
          # would pass on the string "null" and we'd build .../pull/null.
          pr_number=$(gh api "repos/${REPO}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$pr_number" ]; then
            change_set_link="https://github.com/${REPO}/pull/${pr_number}"
          else
            encoded_tag=$(printf '%s@%s' "$name" "$version" | jq -sRr @uri)
            change_set_link="https://github.com/${REPO}/releases/tag/${encoded_tag}"
          fi

          payload=$(jq -n \
            --arg version            "$version" \
            --arg changeSetLink      "$change_set_link" \
            --arg actor              "$ACTOR" \
            --arg preReleaseWarning  ":warning: *This is a pre-release version — not intended for production use.*" \
            '{version: $version, changeSetLink: $changeSetLink, actor: $actor, preReleaseWarning: $preReleaseWarning}')

          curl -X POST -H 'Content-type: application/json' \
            -d "$payload" \
            "$SLACK_WEBHOOK_URL"
